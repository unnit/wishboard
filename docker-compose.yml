version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build:
      context: .
    command: bundle exec puma -C config/puma.rb
    volumes:
      - .:/myapp
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: ${RAILS_ENV}
      CONFIG_SECRET_PROD: ${CONFIG_SECRET_PROD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}:5432/${POSTGRES_DB}
    depends_on:
      - db
      - redis

  # lockgen:
  #   image: ruby:3.3.0
  #   volumes:
  #     - .:/app
  #   working_dir: /app
  #   command: bash -c "gem install bundler && bundle install"
    

volumes:
  pgdata:
