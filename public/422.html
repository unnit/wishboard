<!DOCTYPE html>
<html>
<head>

    color: #732db0;

    box-shadow: 0 2px 10px #300e4e;
  }
  .box-with-shad a{
    text-decoration: none;
  }
  .nav-span{
    float: left;
    margin-top: 21px;
    margin-left: 5px;
    color: white;
    font-size: 20px;

  <div class="navbar">
