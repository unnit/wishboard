# Files in the config/locales directory are used for internationalization
# and are automatically loaded by Rails. If you want to use locales other
# than English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t 'hello'
#
# In views, this is aliased to just `t`:
#
#     <%= t('hello') %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more, please read the Rails Internationalization guide
# available at http://guides.rubyonrails.org/i18n.html.

en:
  sms:
    cocotransfer:
      success:
        to_donor: "You've gifted Rs %{amount} to %{fundraiser_name}'s %{showcase_title} wish!\n Transaction ID is %{txnid}."
        to_fundraiser: "You've got fresh funds gifted by %{donor_name}! Your account has been credited with Rs %{amount}"
        to_cocomanager: "%{donor_name}! gifted Rs %{amount} to %{fundraiser_name}"
      failed:
        to_donor: "Sorry, Your payment failed. %{msg}. ID: %{txnid}"
        to_cocomanager: "%{showcase_title}- Payment failed %{msg}. Name: %{donor_name} ID: %{txnid}"
  hello: "Hello world"
  errors:
    messages:
      extension_white_list_error: "- Please upload %{allowed_types} files"
