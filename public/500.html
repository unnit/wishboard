<html>
<head>

  div.dialog {

  <div class="navbar">
    <a class="logo" href="/">
      <img class="img-responsive" src="/assets/coc.png" alt="Coc">

  <div class="dialog">
    <div>
      <h1>Ooops...Something went wrong. Please try again.</h1>
    </div>
  </div>

</html>
